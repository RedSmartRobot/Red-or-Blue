<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Red or Blue</title>

    <!-- ✅ Use ethers v5 UMD (works in normal HTML) -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 { margin-top: 20px; }

        img {
            width: 320px;
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }

        #redBtn { background-color: #ff4d4d; color: white; }
        #blueBtn { background-color: #4d79ff; color: white; }
        #resetBtn { background-color: black; color: white; }

        .counter {
            font-size: 20px;
            margin: 10px;
        }
    </style>
</head>

<body>

<h1>RED OR BLUE</h1>
<h3>Make your choice!</h3>

<!-- Replace robot.jpg with your image filename -->
<img src="robot.jpg" alt="Robot offering red and blue pill">

<div>
    <button id="redBtn">Vote RED</button>
    <button id="blueBtn">Vote BLUE</button>
</div>

<div class="counter">
    Total RED votes: <span id="redCount">0</span>
</div>

<div class="counter">
    Total BLUE votes: <span id="blueCount">0</span>
</div>

<div>
    <button id="resetBtn" disabled>RESET</button>
</div>

<script>

//////////////////////////////
// CONTRACT CONFIGURATION
//////////////////////////////

const contractAddress = "0x3254f6bb96420F601b859b6dA32799f4CE8271f0";

const abi = [
	{ "inputs": [], "name": "reset", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
	{ "inputs": [], "stateMutability": "nonpayable", "type": "constructor" },
	{ "inputs": [], "name": "voteBlue", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
	{ "inputs": [], "name": "voteRed", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
	{
		"inputs": [],
		"name": "blueVotes",
		"outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [{ "internalType": "address", "name": "", "type": "address" }],
		"name": "hasVoted",
		"outputs": [{ "internalType": "bool", "name": "", "type": "bool" }],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "owner",
		"outputs": [{ "internalType": "address", "name": "", "type": "address" }],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "redVotes",
		"outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }],
		"stateMutability": "view",
		"type": "function"
	}
];

//////////////////////////////

let provider;
let signer;
let contract;
let userAddress;

async function connect() {

    if (!window.ethereum) {
        alert("Please install MetaMask.");
        return;
    }

    provider = new ethers.providers.Web3Provider(window.ethereum);

    await provider.send("eth_requestAccounts", []);

    await switchToSepolia();

    signer = provider.getSigner();
    userAddress = await signer.getAddress();

    contract = new ethers.Contract(contractAddress, abi, signer);

    await checkOwner();
    await updateCounters();
}

////////////////////////////////////////////
// Automatically switch to Sepolia
////////////////////////////////////////////

async function switchToSepolia() {

    const sepoliaChainId = "0xaa36a7"; // 11155111 in hex

    try {
        await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: sepoliaChainId }]
        });
    } catch (error) {

        if (error.code === 4902) {
            await window.ethereum.request({
                method: "wallet_addEthereumChain",
                params: [{
                    chainId: sepoliaChainId,
                    chainName: "Sepolia",
                    nativeCurrency: {
                        name: "Sepolia ETH",
                        symbol: "ETH",
                        decimals: 18
                    },
                    rpcUrls: ["https://rpc.sepolia.org"],
                    blockExplorerUrls: ["https://sepolia.etherscan.io"]
                }]
            });
        } else {
            console.error(error);
        }
    }
}

////////////////////////////////////////////

async function updateCounters() {
    const red = await contract.redVotes();
    const blue = await contract.blueVotes();

    document.getElementById("redCount").innerText = red.toString();
    document.getElementById("blueCount").innerText = blue.toString();
}

async function voteRed() {
    try {
        const tx = await contract.voteRed();
        await tx.wait();
        updateCounters();
    } catch (err) {
        alert("Transaction failed (maybe already voted).");
    }
}

async function voteBlue() {
    try {
        const tx = await contract.voteBlue();
        await tx.wait();
        updateCounters();
    } catch (err) {
        alert("Transaction failed (maybe already voted).");
    }
}

async function checkOwner() {
    const owner = await contract.owner();

    if (owner.toLowerCase() === userAddress.toLowerCase()) {
        document.getElementById("resetBtn").disabled = false;
    }
}

async function resetVotes() {
    try {
        const tx = await contract.reset();
        await tx.wait();
        updateCounters();
    } catch (err) {
        alert("Only contract owner can reset.");
    }
}

document.getElementById("redBtn").onclick = voteRed;
document.getElementById("blueBtn").onclick = voteBlue;
document.getElementById("resetBtn").onclick = resetVotes;

connect();

</script>

</body>
</html>
